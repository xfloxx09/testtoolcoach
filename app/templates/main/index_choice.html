{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-10 text-center">
        <h1 class="mb-5">Willkommen im Coaching-Tool</h1>
        <div class="row">
            <div class="col-md-6 mb-4">
                <a href="{{ url_for('main.coaching_dashboard') }}" class="btn btn-lg btn-block p-5" style="background-color: #e20074; color: white; border-radius: 20px; text-decoration: none; min-height: 250px; display: flex; flex-direction: column; justify-content: center; align-items: center;">
                    <i class="fas fa-chalkboard-teacher" style="font-size: 5rem; margin-bottom: 20px;"></i>
                    <h2>Coachings</h2>
                    <p>Einzel-Coachings</p>
                </a>
            </div>
            <div class="col-md-6 mb-4">
                <a href="{{ url_for('main.workshop_dashboard') }}" class="btn btn-lg btn-block p-5" style="background-color: #007bff; color: white; border-radius: 20px; text-decoration: none; min-height: 250px; display: flex; flex-direction: column; justify-content: center; align-items: center;">
                    <i class="fas fa-users" style="font-size: 5rem; margin-bottom: 20px;"></i>
                    <h2>Workshops</h2>
                    <p>Gruppen-Coachings</p>
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
